name: Executar Robô Outbound Shopee

on:
  repository_dispatch:
    types: [trigger_robo_outbound] # <-- NOME NOVO PARA A VERCEL CHAMAR SÓ ESSE
  workflow_dispatch: # Botão manual no GitHub

jobs:
  run-bot-outbound:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chrome e WebDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Rodar Script Python Outbound
        env:
          # Você usa as mesmas Secrets que já configurou no GitHub!
          SPX_USERNAME: ${{ secrets.SPX_USERNAME }}
          SPX_PASSWORD: ${{ secrets.SPX_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          # Chama o arquivo outbound separado
          python outbound.py
