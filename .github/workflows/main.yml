name: Executar Robô Logística Shopee-Ilox

on:
  repository_dispatch:
    types: [trigger_robo_logistica] # O "nome" que a Vercel vai chamar
  workflow_dispatch: # Permite que você rode manualmente pelo botão no GitHub se precisar

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager google-api-python-client google-auth-httplib2 google-auth-oauthlib pytz

      - name: Instalar Chrome e WebDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Rodar Script Python
        env:
          # Estas variáveis você deve cadastrar no GitHub Settings > Secrets
          SPX_USERNAME: ${{ secrets.SPX_USERNAME }}
          SPX_PASSWORD: ${{ secrets.SPX_PASSWORD }}
          ILOX_EMAIL: ${{ secrets.ILOX_EMAIL }}
          ILOX_SENHA: ${{ secrets.ILOX_SENHA }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          # O comando abaixo roda o script e força a parada após um ciclo 
          # para não ficar preso no 'while True' infinito do código original
          python main.py --once
