name: Bot Selenium Shopee (Otimizado)

on:
  schedule:
    - cron: '*/15 * * * *' # A cada 15 minutos
  workflow_dispatch: # Manual

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Bibliotecas Python
        run: |
          pip install -r requirements.txt

      - name: Executar Robô
        env:
          SPX_USERNAME: ${{ secrets.SPX_USERNAME }}
          SPX_PASSWORD: ${{ secrets.SPX_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py

      - name: Upload de Screenshots de Debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-debug
          path: "*.png"
